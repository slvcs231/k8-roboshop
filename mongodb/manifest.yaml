apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshopproject
    component: mongodb
    tier: db

spec:
  replicas: 3

  selector:
    matchLabels:
      project: roboshopproject
      component: mongodb
      tier: db

  template:
    metadata:
      labels:
        project: roboshopproject
        component: mongodb
        tier: db

    spec:
      containers:
      - name: mongodb
        image: joindevops/mongodb:v1

        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10


---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace:  roboshop
spec:
  #type: NodePort
  selector:
    project:  roboshop
    component:  mongodb
    tier: db
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017


